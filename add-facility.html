<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add New Facility - FacilityManager</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <nav>
      <div class="logo">FacilityManager</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="facilities.html" class="active">Facilities</a></li>
        <li><a href="maintenance.html">Maintenance</a></li>
        <li><a href="reports.html">Reports</a></li>
        <li><a href="settings.html">Settings</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <h1>Add New Facility</h1>
    <p>Enter the details for the new facility below.</p>
    
    <div class="form-container">
      <form id="add-facility-form">
        <div class="form-group">
          <label for="facility-name">Facility Name</label>
          <input type="text" id="facility-name" name="facility-name" required>
        </div>
        
        <div class="form-group">
          <label for="facility-address">Address</label>
          <textarea id="facility-address" name="facility-address" rows="3" required></textarea>
        </div>
        
        <div class="form-group">
          <label for="square-footage">Square Footage</label>
          <input type="number" id="square-footage" name="square-footage" min="1" required>
        </div>
        
        <div class="form-group">
          <label for="floors">Number of Floors</label>
          <input type="number" id="floors" name="floors" min="1" required>
        </div>
        
        <div class="form-group">
          <label for="occupancy">Maximum Occupancy</label>
          <input type="number" id="occupancy" name="occupancy" min="1" required>
        </div>
        
        <div class="form-group">
          <label for="facility-image">Facility Image</label>
          <input type="file" id="facility-image" name="facility-image" accept="image/*">
          <small>Optional: Upload an image of the facility</small>
        </div>
        
        <div class="form-group">
          <button type="submit">Add Facility</button>
          <a href="facilities.html" style="margin-left: 10px; text-decoration: none; color: #666;">Cancel</a>
        </div>
      </form>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2025 FacilityManager. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/facilities.js"></script>
</body>
</html>
