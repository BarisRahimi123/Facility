<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fieldwire - Construction Management Software</title>
  <meta http-equiv="refresh" content="0;url=dashboard.html">
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      line-height: 1.6;
      margin: 0;
      padding: 0;
      background-color: #f8f9fa;
      text-align: center;
      padding-top: 50px;
      color: #333;
    }
    
    .container {
      width: 90%;
      max-width: 1200px;
      margin: auto;
      padding: 20px;
    }
    
    .logo {
      max-width: 200px;
      margin-bottom: 20px;
    }
    
    h1 {
      color: #0056b3;
      font-weight: 600;
      margin-bottom: 20px;
    }
    
    p {
      color: #555;
      margin-bottom: 30px;
      font-size: 18px;
    }
    
    a {
      color: #0056b3;
      text-decoration: none;
      font-weight: 500;
    }
    
    a:hover {
      text-decoration: underline;
    }
    
    .nav-links {
      margin-top: 40px;
    }
    
    .nav-links a {
      display: inline-block;
      margin: 0 10px;
      padding: 12px 24px;
      background-color: #0056b3;
      color: white;
      border-radius: 4px;
      text-decoration: none;
      font-weight: 500;
      transition: background-color 0.3s;
    }
    
    .nav-links a:hover {
      background-color: #004494;
      text-decoration: none;
    }
    
    .loading-spinner {
      display: inline-block;
      width: 50px;
      height: 50px;
      border: 3px solid rgba(0, 86, 179, 0.2);
      border-radius: 50%;
      border-top-color: #0056b3;
      animation: spin 1s ease-in-out infinite;
      margin-bottom: 20px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
  <script>
    window.location.href = "dashboard.html";
  </script>
</head>
<body>
  <div class="container">
    <img src="images/fieldwire-logo.png" alt="Fieldwire Logo" class="logo" onerror="this.src='https://www.fieldwire.com/wp-content/themes/fieldwire/images/logo.svg'; this.onerror=null;">
    <div class="loading-spinner"></div>
    <h1>Loading Fieldwire</h1>
    <p>Connecting to your construction projects...</p>
    <p>If you are not redirected automatically, <a href="dashboard.html">click here</a>.</p>
    
    <div class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="projects.html">Projects</a>
      <a href="tasks.html">Tasks</a>
      <a href="plans.html">Plans</a>
    </div>
  </div>
</body>
</html>
